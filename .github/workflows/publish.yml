on:
  push:
    branches: [main]

name: Render and Publish

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Install R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: "4.5.2"
          use-public-rspm: true

      - name: System dependencies
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            pandoc \
            libcurl4-openssl-dev \
            libssl-dev \
            libxml2-dev \
            libgit2-dev \
            libpng-dev

      - name: Restore renv (madrid-2-2026)
        uses: r-lib/actions/setup-renv@v2
        with:
          working-directory: presentations/madrid-2-2026
          cache-version: 1

      - name: Use renv library for rendering
        working-directory: presentations/madrid-2-2026
        shell: Rscript {0}
        run: |
          lib <- renv::paths$library()
          existing <- Sys.getenv("R_LIBS_USER")
          value <- if (nzchar(existing)) paste(lib, existing, sep = .Platform$path.sep) else lib
          cat(sprintf("R_LIBS_USER=%s\n", value), file = Sys.getenv("GITHUB_ENV"), append = TRUE)

      - name: Render English Profile
        shell: bash
        run: quarto render . --profile english

      - name: Render Spanish Profile
        shell: bash
        run: quarto render . --profile spanish

      - name: Create .nojekyll
        shell: bash
        run: touch _site/.nojekyll

      - name: Publish to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
