on:
  push:
    branches: [main]

name: Render and Publish

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Install R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: "4.5.2"
          use-public-rspm: true

      - name: Install System Dependencies
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libcurl4-openssl-dev \
            libssl-dev \
            libxml2-dev \
            libgit2-dev \
            libpng-dev \
            pandoc

      - name: Restore renv
        uses: r-lib/actions/setup-renv@v2
        with:
          working-directory: presentations/madrid-2-2026

      - name: Register renv library
        shell: bash
        run: |
          # Find the directory containing knitr (e.g., .../renv/library/R-4.5/x86_64-pc-linux-gnu)
          # We search for the 'knitr' directory and take its parent.
          RENV_LIB=$(find presentations/madrid-2-2026/renv/library -name "knitr" -type d | head -n 1 | xargs dirname)
          if [ -z "$RENV_LIB" ]; then
            echo "::error::Could not find renv library path containing knitr"
            exit 1
          fi
          echo "Found renv library: $RENV_LIB"
          echo "R_LIBS_USER=$RENV_LIB:${R_LIBS_USER}" >> $GITHUB_ENV

      - name: Render English Profile
        shell: bash
        run: quarto render . --profile english

      - name: Render Spanish Profile
        shell: bash
        run: quarto render . --profile spanish

      - name: Create .nojekyll
        shell: bash
        run: touch _site/.nojekyll

      - name: Publish to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
