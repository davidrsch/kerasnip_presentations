on:
  push:
    branches: main

name: Render and Publish

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Install R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: "4.5.2"
          use-public-rspm: true

      - name: System dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libcurl4-openssl-dev \
            libssl-dev \
            libxml2-dev \
            libgit2-dev \
            libpng-dev \
            pandoc

      - name: Install R Dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: |
            any::renv

      - name: Restore renv (all presentations)
        shell: bash
        run: |
          set -euo pipefail
          project_libs=""
          while IFS= read -r -d '' lock; do
            proj_dir="$(dirname "$lock")"
            proj_dir="${proj_dir#./}"
            echo "Restoring renv for: ${proj_dir}"
            Rscript -e "renv::restore(project = '${proj_dir}', prompt = FALSE)"

            # Validate restore worked (catches issues before Quarto render).
            export RENV_PROJ="${proj_dir}"
            Rscript -e "renv::load(project = Sys.getenv('RENV_PROJ')); if (!requireNamespace('dplyr', quietly = TRUE)) stop('Missing package after renv::restore(): dplyr')"

            # Collect the project library path so Quarto can always find restored packages.
            lib_path=$(Rscript -e "cat(renv::paths\$library(project = Sys.getenv('RENV_PROJ')))")
            echo "Project library: ${lib_path}"
            project_libs="${lib_path}:${project_libs}"
          done < <(find . -name renv.lock -print0)

          # Prepend all restored project libraries to R_LIBS_USER for subsequent steps.
          # This provides a safety net if a document's renv activation doesn't run.
          if [ -n "${project_libs}" ]; then
            if [ -n "${R_LIBS_USER:-}" ]; then
              echo "R_LIBS_USER=${project_libs}${R_LIBS_USER}" >> "$GITHUB_ENV"
            else
              echo "R_LIBS_USER=${project_libs%:}" >> "$GITHUB_ENV"
            fi
          fi

      - name: Render English Profile
        run: quarto render . --profile english

      - name: Render Spanish Profile
        run: quarto render . --profile spanish

      - name: Create .nojekyll
        run: touch _site/.nojekyll

      - name: Publish to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
